name: Build and Deploy to cPanel

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          COMPANY_EMAIL: ${{ secrets.COMPANY_EMAIL }}
          COMPANY_NAME: ${{ secrets.COMPANY_NAME }}

      - name: Backup public_html via cPanel API
        run: |
          DATETIME=$(date +"%Y%m%d_%H%M%S")
          echo "Backing up public_html to public_html_${DATETIME}..."
          RESPONSE=$(curl -s -k --max-time 30 \
            -u "${{ secrets.CPANEL_USERNAME }}:${{ secrets.CPANEL_PASSWORD }}" \
            "https://structuresewerage.com:2083/execute/Fileman/rename" \
            --data-urlencode "from-dir=/home/${{ secrets.CPANEL_USERNAME }}" \
            --data-urlencode "from-filename=public_html" \
            --data-urlencode "to-filename=public_html_${DATETIME}")
          echo "cPanel API response: $RESPONSE"
          echo "$RESPONSE" | python3 -c "
          import sys, json
          raw = sys.stdin.read().strip()
          if not raw:
            print('WARNING: Empty response from cPanel API - port 2083 may be blocked')
            sys.exit(0)
          try:
            r = json.loads(raw)
            if r.get('status') == 1:
              print('Backup OK')
            else:
              print(f'Backup API error: {r}')
              sys.exit(1)
          except json.JSONDecodeError:
            print(f'WARNING: Non-JSON response: {raw[:200]}')
            sys.exit(1)
          "

      - name: Create fresh public_html folder via cPanel API
        run: |
          RESPONSE=$(curl -s -k --max-time 30 \
            -u "${{ secrets.CPANEL_USERNAME }}:${{ secrets.CPANEL_PASSWORD }}" \
            "https://structuresewerage.com:2083/execute/Fileman/mkdir" \
            --data-urlencode "path=/home/${{ secrets.CPANEL_USERNAME }}" \
            --data-urlencode "name=public_html")
          echo "cPanel API response: $RESPONSE"
          echo "$RESPONSE" | python3 -c "
          import sys, json
          raw = sys.stdin.read().strip()
          if not raw:
            print('WARNING: Empty response from cPanel API')
            sys.exit(0)
          try:
            r = json.loads(raw)
            print('Created public_html OK' if r.get('status') == 1 else f'mkdir failed: {r}')
          except json.JSONDecodeError:
            print(f'WARNING: Non-JSON response: {raw[:200]}')
          "

      - name: Deploy to public_html via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: structuresewerage.com
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./out/
          server-dir: /public_html/
          dangerous-clean-slate: false
