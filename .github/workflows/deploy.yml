name: Build and Deploy to cPanel

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          COMPANY_EMAIL: ${{ secrets.COMPANY_EMAIL }}
          COMPANY_NAME: ${{ secrets.COMPANY_NAME }}

      - name: Backup public_html via FTP
        run: |
          DATETIME=$(date +"%Y%m%d_%H%M%S")
          echo "Installing lftp..."
          sudo apt-get install -y lftp -q
          echo "Downloading public_html for backup..."
          lftp -u "${{ secrets.FTP_USERNAME }}","${{ secrets.FTP_PASSWORD }}" ftp://structuresewerage.com <<LFTP
          set ftp:passive-mode true
          set net:timeout 30
          set net:max-retries 3
          mirror --parallel=5 /public_html /tmp/public_html_backup
          bye
          LFTP
          echo "Uploading backup as public_html_${DATETIME}..."
          lftp -u "${{ secrets.FTP_USERNAME }}","${{ secrets.FTP_PASSWORD }}" ftp://structuresewerage.com <<LFTP
          set ftp:passive-mode true
          set net:timeout 30
          set net:max-retries 3
          mirror --reverse --parallel=5 /tmp/public_html_backup /public_html_${DATETIME}
          bye
          LFTP
          echo "Backup complete: public_html_${DATETIME}"

      - name: Deploy to public_html via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: structuresewerage.com
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./out/
          server-dir: /public_html/
          dangerous-clean-slate: false
