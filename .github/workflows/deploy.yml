name: Build and Deploy to cPanel

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          COMPANY_EMAIL: ${{ secrets.COMPANY_EMAIL }}
          COMPANY_NAME: ${{ secrets.COMPANY_NAME }}

      - name: Backup and rotate public_html via FTP
        run: |
          DATETIME=$(date +"%Y%m%d_%H%M%S")
          echo "Creating backup folder public_html_${DATETIME} via FTP..."
          python3 - <<EOF
          import ftplib, os, sys

          host = "structuresewerage.com"
          user = "${{ secrets.FTP_USERNAME }}"
          pwd  = "${{ secrets.FTP_PASSWORD }}"
          dt   = "${DATETIME}"

          def list_dir(ftp, path):
              items = []
              ftp.cwd(path)
              ftp.retrlines("LIST", items.append)
              return items

          def ftp_copy_dir(ftp, src, dst):
              try:
                  ftp.mkd(dst)
              except:
                  pass
              ftp.cwd(src)
              entries = []
              ftp.retrlines("NLST", entries.append)
              for name in entries:
                  src_path = f"{src}/{name}"
                  dst_path = f"{dst}/{name}"
                  try:
                      ftp.cwd(src_path)
                      ftp_copy_dir(ftp, src_path, dst_path)
                      ftp.cwd(src)
                  except:
                      import io
                      buf = io.BytesIO()
                      ftp.retrbinary(f"RETR {name}", buf.write)
                      buf.seek(0)
                      ftp.storbinary(f"STOR {dst_path}", buf)

          with ftplib.FTP(host) as ftp:
              ftp.login(user, pwd)
              backup_name = f"public_html_{dt}"
              print(f"Copying public_html -> {backup_name}")
              ftp_copy_dir(ftp, "/public_html", f"/{backup_name}")
              print(f"Backup complete: {backup_name}")
          EOF

      - name: Deploy to public_html via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: structuresewerage.com
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./out/
          server-dir: /public_html/
          dangerous-clean-slate: false
